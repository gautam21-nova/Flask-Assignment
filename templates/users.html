{% extends "base.html" %}

{% block content %}
<div class="container my-5 max-width-md">
    {% if users %}
        <h1 class="display-6 mb-4 fw-semibold text-dark">Welcome back</h1>
        
        <div class="card shadow-sm border-0">
            <ul class="list-group list-group-flush rounded">
                {% for u in users %}
                    <li class="list-group-item d-flex justify-content-between align-items-center py-3 px-4">
                        <div>
                            <span class="fw-medium text-dark">{{ u.name }}</span>
                            <div class="small text-muted">{{ u.email }}</div>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-light text-secondary border px-2.5 py-1.5 font-monospace small">#{{ u.id }}</span>
                            <span class="badge bg-secondary-subtle text-secondary-emphasis rounded-pill px-3 ms-2 text-capitalize">{{ u.role }}</span>
                        </div>
                    </li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}   
</div>
{% endblock %}
